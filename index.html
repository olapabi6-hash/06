<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Multi Render DRY</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .container {
      margin-bottom: 40px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    th {
      background: #eee;
    }

    .card-wrapper {
      display: flex;
      gap: 10px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 8px;
      width: 120px;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>

<h2>Multi Render (Table, Card, List)</h2>

<div id="table-view" class="container"></div>
<div id="card-view" class="container"></div>
<div id="list-view" class="container"></div>

<script>
  // ===== DATASET =====
  const data = [
    { id: 1, nama: "Satu" },
    { id: 2, nama: "Dua" },
    { id: 3, nama: "Tiga" }
  ];

  const columns = [
    { key: "id", label: "ID" },
    { key: "nama", label: "Nama" }
  ];

  // ===== CORE (DRY) =====
  function createElement(tag, content = "", className = "") {
    const el = document.createElement(tag);
    if (content) el.textContent = content;
    if (className) el.className = className;
    return el;
  }

  // ===== TABLE MODULE =====
  function renderTable(container, columns, data) {
    const table = createElement("table");

    const thead = createElement("thead");
    const trHead = createElement("tr");

    columns.forEach(col => {
      trHead.appendChild(createElement("th", col.label));
    });

    thead.appendChild(trHead);
    table.appendChild(thead);

    const tbody = createElement("tbody");

    data.forEach(row => {
      const tr = createElement("tr");

      columns.forEach(col => {
        tr.appendChild(createElement("td", row[col.key]));
      });

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    container.appendChild(table);
  }

  // ===== CARD MODULE =====
  function renderCard(container, data) {
    const wrapper = createElement("div", "", "card-wrapper");

    data.forEach(item => {
      const card = createElement("div", "", "card");

      card.appendChild(createElement("p", "ID: " + item.id));
      card.appendChild(createElement("p", "Nama: " + item.nama));

      wrapper.appendChild(card);
    });

    container.appendChild(wrapper);
  }

  // ===== LIST MODULE =====
  function renderList(container, data) {
    const ul = createElement("ul");

    data.forEach(item => {
      const li = createElement("li", `ID ${item.id} - ${item.nama}`);
      ul.appendChild(li);
    });

    container.appendChild(ul);
  }

  // ===== MAIN RENDER (SCALABLE) =====
  function render(type, containerId, data, columns = []) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    if (type === "table") {
      renderTable(container, columns, data);
    } else if (type === "card") {
      renderCard(container, data);
    } else if (type === "list") {
      renderList(container, data);
    }
  }

  // ===== INIT =====
  render("table", "table-view", data, columns);
  render("card", "card-view", data);
  render("list", "list-view", data);

</script>

</body>
</html>
