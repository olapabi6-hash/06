<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Multi Render 9 Data</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .btn-group {
      margin-bottom: 20px;
    }

    button {
      padding: 8px 12px;
      margin-right: 10px;
      border: none;
      cursor: pointer;
      background: #007bff;
      color: white;
      border-radius: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    th {
      background: #eee;
    }

    .card-wrapper {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 8px;
      width: 120px;
    }
  </style>
</head>
<body>

<h2>Multi Render (9 Data)</h2>

<div class="btn-group">
  <button onclick="render('table')">Table</button>
  <button onclick="render('card')">Card</button>
  <button onclick="render('list')">List</button>
</div>

<div id="app"></div>

<script>
  // ===== DATA (9 ITEM) =====
  const data = [
    { id: 1, nama: "Satu" },
    { id: 2, nama: "Dua" },
    { id: 3, nama: "Tiga" },
    { id: 4, nama: "Empat" },
    { id: 5, nama: "Lima" },
    { id: 6, nama: "Enam" },
    { id: 7, nama: "Tujuh" },
    { id: 8, nama: "Delapan" },
    { id: 9, nama: "Sembilan" }
  ];

  const columns = [
    { key: "id", label: "ID" },
    { key: "nama", label: "Nama" }
  ];

  // ===== CORE =====
  function createElement(tag, content = "", className = "") {
    const el = document.createElement(tag);
    if (content) el.textContent = content;
    if (className) el.className = className;
    return el;
  }

  // ===== TABLE =====
  function renderTable(container) {
    const table = createElement("table");

    const thead = createElement("thead");
    const trHead = createElement("tr");

    columns.forEach(col => {
      trHead.appendChild(createElement("th", col.label));
    });

    thead.appendChild(trHead);
    table.appendChild(thead);

    const tbody = createElement("tbody");

    data.forEach(row => {
      const tr = createElement("tr");

      columns.forEach(col => {
        tr.appendChild(createElement("td", row[col.key]));
      });

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    container.appendChild(table);
  }

  // ===== CARD =====
  function renderCard(container) {
    const wrapper = createElement("div", "", "card-wrapper");

    data.forEach(item => {
      const card = createElement("div", "", "card");

      card.appendChild(createElement("p", "ID: " + item.id));
      card.appendChild(createElement("p", "Nama: " + item.nama));

      wrapper.appendChild(card);
    });

    container.appendChild(wrapper);
  }

  // ===== LIST =====
  function renderList(container) {
    const ul = createElement("ul");

    data.forEach(item => {
      ul.appendChild(createElement("li", `ID ${item.id} - ${item.nama}`));
    });

    container.appendChild(ul);
  }

  // ===== CONTROLLER =====
  function render(type) {
    const app = document.getElementById("app");
    app.innerHTML = "";

    if (type === "table") renderTable(app);
    else if (type === "card") renderCard(app);
    else if (type === "list") renderList(app);
  }

  // ===== DEFAULT =====
  render("table");
</script>

</body>
</html>
